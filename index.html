<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mapa de Stands – Feria Mayo 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pagado:#22c55e; --pagado-t:#14532d;
    --senado:#facc15; --senado-t:#713f12;
    --disp:#ffffff;   --disp-t:#374151;
    --excedido:#f97316; --excedido-t:#7c2d12;
    --bg:#f0f4f8; --font:'DM Sans',system-ui,sans-serif;
  }
  body { font-family:var(--font); background:var(--bg); min-height:100vh; color:#1e293b; }
  header { background:#1e293b; color:white; padding:8px 12px 6px; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,.3); }
  header h1 { font-size:17px; font-weight:700; letter-spacing:-.3px; }
  header p  { font-size:12px; opacity:.65; margin-top:1px; }
  .stats { display:flex; gap:8px; padding:10px 14px; background:#1e293b; border-top:1px solid rgba(255,255,255,.1); overflow-x:auto; scrollbar-width:none; }
  .stats::-webkit-scrollbar { display:none; }
  .stat-pill { display:flex; align-items:center; gap:6px; background:rgba(255,255,255,.1); border-radius:20px; padding:5px 12px; white-space:nowrap; font-size:12px; color:white; }
  .stat-pill .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .stat-pill strong { font-weight:700; margin-left:2px; }
  .tabs { display:flex; background:white; border-bottom:2px solid #e2e8f0; position:sticky; top:70px; z-index:90; }
  .tab-btn { flex:1; padding:12px 8px; font-size:14px; font-weight:600; font-family:var(--font); border:none; background:none; cursor:pointer; color:#64748b; border-bottom:3px solid transparent; margin-bottom:-2px; transition:all .2s; }
  .tab-btn.active { color:#1e293b; border-bottom-color:#1e293b; }
  .filters { padding:6px 10px; display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; background:white; border-bottom:1px solid #e2e8f0; }
  .filters::-webkit-scrollbar { display:none; }
  .filter-btn { padding:6px 14px; border-radius:20px; border:2px solid #e2e8f0; font-size:13px; font-weight:600; font-family:var(--font); cursor:pointer; white-space:nowrap; background:white; color:#64748b; transition:all .15s; }
  .filter-btn.active { border-color:#1e293b; color:#1e293b; background:#f8fafc; }
  .filter-btn[data-f="Pagado"].active    { border-color:var(--pagado); color:var(--pagado-t); background:#f0fdf4; }
  .filter-btn[data-f="Señado"].active    { border-color:#ca8a04; color:var(--senado-t); background:#fefce8; }
  .filter-btn[data-f="Disponible"].active{ border-color:#94a3b8; color:#334155; background:#f8fafc; }
  .search-wrap { padding:6px 10px; background:white; border-bottom:1px solid #e2e8f0; }
  .search-wrap input { width:100%; padding:9px 14px; border:2px solid #e2e8f0; border-radius:8px; font-size:14px; font-family:var(--font); outline:none; transition:border-color .2s; }
  .search-wrap input:focus { border-color:#94a3b8; }
  .floor { display:none; }
  .floor.active { display:block; }
  .zoom-controls { position:fixed; bottom:24px; right:16px; z-index:150; display:flex; flex-direction:column; gap:6px; }
  .zoom-btn { width:44px; height:44px; border-radius:50%; background:#1e293b; color:white; border:none; font-size:22px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,.35); font-family:var(--font); user-select:none; -webkit-tap-highlight-color:transparent; }
  .zoom-btn:active { transform:scale(.92); }
  .zoom-level { text-align:center; font-size:11px; color:#64748b; font-weight:600; }
  .map-scroll { overflow:auto; padding:6px; -webkit-overflow-scrolling:touch; }
  .map-inner { transform-origin:top left; width:max-content; transition:transform 0.15s ease; position:relative; }
  .map-bg { position:absolute; top:0; left:0; pointer-events:none; z-index:0; }
  .grid { display:grid; gap:2px; grid-auto-rows:30px; position:relative; z-index:1; }
  .stand { border-radius:7px; padding:3px 3px 2px; cursor:pointer; transition:transform .15s,box-shadow .15s; border:2px solid transparent; width:136px; height:62px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; position:relative; user-select:none; }
  .stand:active { transform:scale(.95); }
  .stand[data-e="Pagado"]     { background:var(--pagado);   color:var(--pagado-t);   box-shadow:0 1px 4px rgba(0,0,0,.15); }
  .stand[data-e="Señado"]     { background:var(--senado);   color:var(--senado-t);   box-shadow:0 1px 4px rgba(0,0,0,.15); }
  .stand[data-e="Disponible"] { background:var(--disp);     color:var(--disp-t);     border:2px solid #9333ea; box-shadow:0 1px 4px rgba(0,0,0,.1); }
  .stand[data-e="Excedido"]   { background:var(--excedido); color:var(--excedido-t); box-shadow:0 1px 4px rgba(0,0,0,.15); }
  .stand.dimmed      { opacity:.18; pointer-events:none; }
  .stand.highlighted { box-shadow:0 0 0 3px #1e293b; transform:scale(1.06); z-index:5; }
  .stand .snum { font-size:24px; font-weight:700; line-height:1; letter-spacing:-.5px; }
  .stand .srub { font-size:13px; font-weight:500; line-height:1.2; margin-top:3px; max-width:100%; word-break:break-word; hyphens:auto; opacity:.85; }
  .empty { min-width:136px; min-height:62px; background:transparent; }
  .legend { padding:12px 14px 20px; display:flex; flex-wrap:wrap; gap:8px; }
  .leg-item { display:flex; align-items:center; gap:6px; font-size:12px; color:#475569; font-weight:500; }
  .leg-dot { width:14px; height:14px; border-radius:3px; flex-shrink:0; }

  /* MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:200; align-items:flex-end; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:white; border-radius:18px 18px 0 0; padding:20px 20px 36px; width:100%; max-width:480px; animation:slideUp .25s ease; position:relative; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-handle { width:38px; height:4px; background:#e2e8f0; border-radius:2px; margin:0 auto 16px; }
  .modal-badge { display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:700; margin-bottom:12px; }
  .modal-badge[data-e="Pagado"]     { background:var(--pagado);   color:var(--pagado-t); }
  .modal-badge[data-e="Señado"]     { background:var(--senado);   color:var(--senado-t); }
  .modal-badge[data-e="Disponible"] { background:#f1f5f9; color:#475569; border:1.5px solid #9333ea; }
  .modal-badge[data-e="Excedido"]   { background:var(--excedido); color:var(--excedido-t); }
  .modal h2       { font-size:28px; font-weight:700; }
  .modal-nombre   { font-size:18px; font-weight:700; color:#1e293b; margin-top:8px; }
  .modal-rubro    { font-size:15px; color:#475569; margin-top:4px; font-weight:500; }
  .modal-zona     { font-size:12px; color:#94a3b8; margin-top:4px; }
  .modal-tel {
    display:inline-flex; align-items:center; gap:8px;
    margin-top:12px; padding:8px 14px;
    background:#f0fdf4; border-radius:10px;
    text-decoration:none; color:#15803d;
    font-size:15px; font-weight:600;
    border:1.5px solid #bbf7d0;
  }
  .modal-tel:active { background:#dcfce7; }
  .modal-money { display:flex; gap:10px; margin-top:18px; }
  .money-box { flex:1; padding:10px 14px; border-radius:10px; background:#f8fafc; }
  .money-box .label  { font-size:11px; color:#94a3b8; font-weight:600; text-transform:uppercase; letter-spacing:.4px; }
  .money-box .amount { font-size:18px; font-weight:700; color:#1e293b; margin-top:2px; }
  .money-box.debe-ok  { background:#f0fdf4; }
  .money-box.debe-ok  .amount { color:#15803d; }
  .money-box.debe-mal { background:#fee2e2; }
  .money-box.debe-mal .amount { color:#b91c1c; }
  .modal-close { position:absolute; top:18px; right:18px; background:#f1f5f9; border:none; border-radius:50%; width:32px; height:32px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#64748b; font-family:var(--font); }

  /* ── LOGIN ── */
  #loginScreen {
    position:fixed; inset:0; background:#1e293b;
    display:flex; align-items:center; justify-content:center;
    z-index:999; padding:24px;
  }
  #loginScreen.hidden { display:none; }
  .login-card {
    background:white; border-radius:20px; padding:32px 28px 36px;
    width:100%; max-width:360px;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
  }
  .login-logo  { font-size:40px; text-align:center; margin-bottom:6px; }
  .login-title { font-size:20px; font-weight:700; text-align:center; color:#1e293b; }
  .login-sub   { font-size:13px; color:#94a3b8; text-align:center; margin-bottom:28px; margin-top:4px; }
  .login-label { font-size:12px; font-weight:600; color:#64748b; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; display:block; }
  .login-field { margin-bottom:18px; }
  .login-select, .login-input {
    width:100%; padding:12px 14px; border:2px solid #e2e8f0; border-radius:10px;
    font-size:15px; font-family:var(--font); color:#1e293b; outline:none;
    background:white; appearance:none; -webkit-appearance:none;
    transition:border-color .2s;
  }
  .login-select:focus, .login-input:focus { border-color:#1e293b; }
  .select-wrap { position:relative; }
  .select-wrap::after { content:'▾'; position:absolute; right:14px; top:50%; transform:translateY(-50%); color:#94a3b8; pointer-events:none; font-size:16px; }
  .login-btn {
    width:100%; padding:14px; background:#1e293b; color:white;
    border:none; border-radius:10px; font-size:16px; font-weight:700;
    font-family:var(--font); cursor:pointer; margin-top:6px;
    transition:background .2s;
  }
  .login-btn:active { background:#334155; }
  .login-btn:disabled { background:#94a3b8; cursor:not-allowed; }
  .login-error { color:#b91c1c; font-size:13px; font-weight:600; text-align:center; margin-top:14px; min-height:18px; }
  .login-user-pill {
    display:inline-flex; align-items:center; gap:6px;
    background:rgba(255,255,255,.15); border-radius:20px;
    padding:3px 10px 3px 7px; font-size:12px; color:white; font-weight:600;
    cursor:pointer; margin-left:8px; vertical-align:middle; border:none;
    font-family:var(--font);
  }
  .login-user-pill:hover { background:rgba(255,255,255,.25); }

  /* ── ASIGNAR FERIANTE ── */
  .assign-section {
    margin-top:18px; padding:14px 16px; background:#f5f3ff;
    border:1.5px solid #9333ea; border-radius:12px;
  }
  .assign-section .assign-title {
    font-size:12px; font-weight:700; color:#6b21a8;
    text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px;
  }
  .assign-search-wrap { position:relative; margin-bottom:10px; }
  .assign-search-input {
    width:100%; padding:10px 36px 10px 12px; border:2px solid #d8b4fe;
    border-radius:8px; font-size:14px; font-family:var(--font); color:#1e293b;
    background:white; outline:none; transition:border-color .2s;
  }
  .assign-search-input:focus { border-color:#9333ea; }
  .assign-search-clear {
    position:absolute; right:10px; top:50%; transform:translateY(-50%);
    background:none; border:none; font-size:18px; color:#9333ea;
    cursor:pointer; padding:0; line-height:1; display:none;
  }
  .assign-dropdown {
    position:absolute; top:calc(100% + 4px); left:0; right:0;
    background:white; border:2px solid #d8b4fe; border-radius:8px;
    max-height:200px; overflow-y:auto; z-index:300;
    box-shadow:0 4px 16px rgba(0,0,0,.12);
    scrollbar-width:thin; scrollbar-color:#d8b4fe transparent;
    display:none;
  }
  .assign-dropdown.open { display:block; }
  .assign-dropdown-item {
    padding:11px 14px; font-size:14px; font-family:var(--font);
    color:#1e293b; cursor:pointer; border-bottom:1px solid #f3f0ff;
    transition:background .1s;
  }
  .assign-dropdown-item:last-child { border-bottom:none; }
  .assign-dropdown-item:active,
  .assign-dropdown-item.focused { background:#f5f3ff; color:#6b21a8; }
  .assign-dropdown-item mark {
    background:#ede9fe; color:#6b21a8; border-radius:2px;
    font-weight:700; padding:0 1px;
  }
  .assign-dropdown-empty {
    padding:12px 14px; font-size:13px; color:#94a3b8; text-align:center;
  }
  .assign-selected-pill {
    display:none; align-items:center; gap:8px; margin-bottom:10px;
    padding:8px 12px; background:#ede9fe; border-radius:8px;
    border:1.5px solid #c4b5fd;
  }
  .assign-selected-pill.visible { display:flex; }
  .assign-selected-pill span { font-size:14px; font-weight:600; color:#6b21a8; flex:1; }
  .assign-selected-pill button {
    background:none; border:none; font-size:18px; color:#9333ea;
    cursor:pointer; padding:0; line-height:1;
  }
  .assign-btn {
    width:100%; padding:10px; background:#7c3aed; color:white;
    border:none; border-radius:8px; font-size:14px; font-weight:700;
    font-family:var(--font); cursor:pointer; transition:background .2s;
  }
  .assign-btn:active { background:#6d28d9; }
  .assign-btn:disabled { background:#c4b5fd; cursor:not-allowed; }
  .assign-msg { font-size:13px; font-weight:600; text-align:center; margin-top:8px; min-height:16px; }
  .assign-msg.ok  { color:#15803d; }
  .assign-msg.err { color:#b91c1c; }

  /* ── PAGOS ── */
  .pagos-section {
    margin-top:16px; padding:14px 16px;
    background:#fffbeb; border:1.5px solid #f59e0b; border-radius:12px;
  }
  .pagos-title {
    font-size:12px; font-weight:700; color:#92400e;
    text-transform:uppercase; letter-spacing:.5px; margin-bottom:12px;
  }
  .pagos-list { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
  .pago-item {
    display:flex; align-items:center; gap:10px; padding:9px 12px;
    background:white; border-radius:8px; border:1.5px solid #e2e8f0;
  }
  .pago-item.cargado { border-color:#86efac; background:#f0fdf4; }
  .pago-num {
    width:22px; height:22px; border-radius:50%; background:#f59e0b; color:white;
    font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .pago-item.cargado .pago-num { background:#22c55e; }
  .pago-info { flex:1; min-width:0; }
  .pago-estado { font-size:12px; font-weight:600; color:#64748b; }
  .pago-item.cargado .pago-estado { color:#15803d; }
  .pago-detalle { font-size:11px; color:#94a3b8; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pago-monto { font-size:15px; font-weight:700; color:#15803d; }

  /* Formulario de carga de pago */
  .pago-form { display:flex; flex-direction:column; gap:10px; }
  .pago-form-title { font-size:13px; font-weight:700; color:#92400e; }
  .pago-input-row { display:flex; gap:8px; }
  .pago-input-group { flex:1; display:flex; flex-direction:column; gap:4px; }
  .pago-label { font-size:11px; font-weight:600; color:#64748b; text-transform:uppercase; letter-spacing:.4px; }
  .pago-input, .pago-select {
    width:100%; padding:9px 12px; border:2px solid #fde68a; border-radius:8px;
    font-size:14px; font-family:var(--font); color:#1e293b; outline:none;
    background:white; transition:border-color .2s; appearance:none; -webkit-appearance:none;
  }
  .pago-input:focus, .pago-select:focus { border-color:#f59e0b; }
  .pago-select-wrap { position:relative; }
  .pago-select-wrap::after { content:'▾'; position:absolute; right:10px; top:50%; transform:translateY(-50%); color:#94a3b8; pointer-events:none; }
  .pago-btn {
    width:100%; padding:10px; background:#f59e0b; color:white;
    border:none; border-radius:8px; font-size:14px; font-weight:700;
    font-family:var(--font); cursor:pointer; transition:background .2s;
  }
  .pago-btn:active { background:#d97706; }
  .pago-btn:disabled { background:#fcd34d; cursor:not-allowed; color:#92400e; }
  .pago-msg { font-size:13px; font-weight:600; text-align:center; min-height:16px; }
  .pago-msg.ok  { color:#15803d; }
  .pago-msg.err { color:#b91c1c; }
</style>
</head>
<body>

<!-- ── PANTALLA DE LOGIN ── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🎪</div>
    <div class="login-title">Feria Mayo 2026</div>
    <div class="login-sub">Mapa de Stands</div>

    <div class="login-field">
      <label class="login-label" for="loginUser">Usuario</label>
      <div class="select-wrap">
        <select id="loginUser" class="login-select">
          <option value="">Cargando usuarios...</option>
        </select>
      </div>
    </div>

    <div class="login-field">
      <label class="login-label" for="loginPass">Contraseña</label>
      <input id="loginPass" type="password" class="login-input" placeholder="Ingresá tu contraseña"
        onkeydown="if(event.key==='Enter') doLogin()">
    </div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">Ingresar</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<header>
  <h1>🎪 Mapa de Stands — Feria Mayo 2026 v8.1 <button class="login-user-pill" id="userPill" onclick="cerrarSesion()" style="display:none">👤 <span id="userPillName"></span> · Salir</button></h1>
  <p id="subtitle">Sincronizando datos...</p>
</header>

<div class="stats" id="statsBar">
  <div class="stat-pill"><div class="dot" style="background:#64748b"></div>Cargando... <strong></strong></div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchFloor('pb', this)">🏠 Planta Baja</button>
  <button class="tab-btn"        onclick="switchFloor('pa', this)">🏢 Planta Alta</button>
</div>

<div class="search-wrap">
  <input type="search" id="searchInput" placeholder="Buscar por número o feriante..." oninput="applyFilters()">
</div>

<div class="filters" id="filterBar">
  <button class="filter-btn active" data-f="todos"      onclick="setFilter('todos', this)">Todos</button>
  <button class="filter-btn"        data-f="Pagado"     onclick="setFilter('Pagado', this)">✅ Pagado</button>
  <button class="filter-btn"        data-f="Señado"     onclick="setFilter('Señado', this)">⭐ Señado</button>
  <button class="filter-btn"        data-f="Disponible" onclick="setFilter('Disponible', this)">🔓 Disponible</button>
</div>

<div class="floor active" id="floor-pb">
  <div class="map-scroll"><div class="map-inner">
    <svg class="map-bg" width="2050" height="1900" xmlns="http://www.w3.org/2000/svg">
      <defs><style>.bg-label{font-family:'DM Sans',sans-serif;font-weight:700;}</style></defs>
      <rect x="140" y="0" width="2050" height="290" fill="#bfdbfe" rx="6"/>
      <rect x="0" y="70" width="138" height="400" fill="#60a5fa" rx="6"/>
      <text class="bg-label" x="230" y="270" text-anchor="middle" fill="white" font-size="18" transform="rotate(-90,69,70)">ESCENARIO</text>
      <rect x="0" y="0" width="138" height="196" fill="#cbd5e1" rx="4"/>
      <text class="bg-label" x="69" y="100" text-anchor="middle" fill="#475569" font-size="15">ACCESO</text>
      <text class="bg-label" x="69" y="116" text-anchor="middle" fill="#475569" font-size="15">PLANTA ALTA</text>
      <text class="bg-label" x="69" y="132" text-anchor="middle" fill="#475569" font-size="13">(escalera)</text>
      <text class="bg-label" x="1050" y="140" text-anchor="middle" fill="#1e3a5f" font-size="28">PATIO CUBIERTO</text>
      <rect x="138" y="290" width="2050" height="1380" fill="#f0c8d8" rx="4"/>
      <text class="bg-label" x="1120" y="700" text-anchor="middle" fill="#1e3a5f" font-size="28">PATIO</text>
      <text class="bg-label" x="1120" y="750" text-anchor="middle" fill="#1e3a5f" font-size="28">DESCUBIERTO</text>
      <rect x="0" y="196" width="138" height="1500" fill="#d4a0b5" rx="4"/>
      <rect x="0" y="1550" width="138" height="130" fill="#cbd5e1" rx="4"/>
      <text class="bg-label" x="69" y="1600" text-anchor="middle" fill="#475569" font-size="15">ACCESO</text>
      <text class="bg-label" x="69" y="1616" text-anchor="middle" fill="#475569" font-size="15">PLANTA ALTA</text>
      <text class="bg-label" x="69" y="1632" text-anchor="middle" fill="#475569" font-size="13">(escalera)</text>
      <rect x="850" y="1220" width="1200" height="800" fill="#666666" rx="6"/>

<script>
document.addEventListener('touchstart', e => { if(e.touches.length>1) e.preventDefault(); }, {passive:false});
document.addEventListener('touchmove',  e => { if(e.touches.length>1) e.preventDefault(); }, {passive:false});
let lastTap = 0;
document.addEventListener('touchend', e => { const now=Date.now(); if(now-lastTap<300) e.preventDefault(); lastTap=now; }, {passive:false});

const API_URL = "https://script.google.com/macros/s/AKfycbw1KPZO2gNyjKoj8GDdoG6QafGNt4EHbzugcqf66eNAt9hyLmw671EBtLZpRtmVX3VHNw/exec";

let FULL_DATA = {}, currentFloor = 'pb', currentFilter = 'todos';
let FERIANTES_LIST = [];
let currentStandId = null;

async function load() {
  try {
    const [resMap, resFeriantes] = await Promise.all([
      fetch(API_URL),
      fetch(API_URL + '?tipo=feriantes')
    ]);
    FULL_DATA = await resMap.json();
    const ferData = await resFeriantes.json();
    if (ferData.ok && ferData.feriantes) {
      FERIANTES_LIST = ferData.feriantes;
      // ❌ ELIMINADO:
      // const sel = document.getElementById('assignSelect');
      // sel.innerHTML = ...
    }
    buildGrid('grid-pb', FULL_DATA.pbData);
    buildGrid('grid-pa', FULL_DATA.paData);
    buildStats();
    const total = Object.keys(FULL_DATA.pbData).length + Object.keys(FULL_DATA.paData).length;
    document.getElementById('subtitle').textContent = `${total} stands · Planta Baja y Planta Alta`;
    aplicarZoom();
  } catch(e) {
    document.getElementById('subtitle').textContent = 'Error al cargar datos';
  }
}

function buildGrid(gridId, data) {
  const el = document.getElementById(gridId);
  const rows = Object.values(data).map(s=>s.r), cols = Object.values(data).map(s=>s.c);
  const minR=Math.min(...rows), maxR=Math.max(...rows), minC=Math.min(...cols), maxC=Math.max(...cols);
  el.style.gridTemplateColumns = `repeat(${maxC-minC+1}, 68px)`;
  const idx = {};
  Object.entries(data).forEach(([num,s]) => { idx[`${s.r},${s.c}`] = {num,...s}; });
  let html = '';
  for (let r=minR; r<=maxR; r++) {
    for (let c=minC; c<=maxC; c++) {
      const s = idx[`${r},${c}`];
      if (s) {
        const extra  = (FULL_DATA.extraData||{})[s.num] || {};
        const nombre = extra.n || '';
        const precio = extra.pr;
        const rubTrunc = s.rb ? (s.rb.length>22 ? s.rb.slice(0,20)+'…' : s.rb) : '';
        const searchLabel = s.e==='Disponible' ? (nombre||rubTrunc) : rubTrunc;
        html += `<div class="stand" data-num="${s.num}" data-e="${s.e}"
          data-rb="${(s.rb||'').replace(/"/g,'&quot;')}"
          data-n="${nombre.replace(/"/g,'&quot;')}"
          data-z="${(s.z||'').replace(/"/g,'&quot;')}"
          onclick="openModal('${s.num}')">
          <span class="snum">${s.num}</span>
          ${searchLabel ? `<span class="srub">${searchLabel.length>22?searchLabel.slice(0,20)+'…':searchLabel}</span>` : ''}
          ${s.e==='Disponible'&&precio ? `<span class="srub" style="font-weight:700">$${Number(precio).toLocaleString('es-AR')}</span>` : ''}
        </div>`;
      } else {
        html += `<div class="empty"></div>`;
      }
    }
  }
  el.innerHTML = html;
}

function buildStats() {
  const all = [...Object.values(FULL_DATA.pbData||{}), ...Object.values(FULL_DATA.paData||{})];
  const count = e => all.filter(s=>s.e===e).length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-pill"><div class="dot" style="background:#64748b"></div>Total <strong>${all.length}</strong></div>
    <div class="stat-pill"><div class="dot" style="background:var(--pagado)"></div>Pagado <strong>${count('Pagado')}</strong></div>
    <div class="stat-pill"><div class="dot" style="background:var(--senado)"></div>Señado <strong>${count('Señado')}</strong></div>
    <div class="stat-pill"><div class="dot" style="background:#e2e8f0;border:1px solid #9333ea"></div>Disponible <strong>${count('Disponible')}</strong></div>`;
}

function switchFloor(f, btn) {
  currentFloor = f;
  document.querySelectorAll('.floor').forEach(el=>el.classList.remove('active'));
  document.getElementById(`floor-${f}`).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
  setTimeout(()=>{ aplicarZoom(); }, 50);
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const gridId = currentFloor==='pb' ? 'grid-pb' : 'grid-pa';
  document.querySelectorAll(`#${gridId} .stand`).forEach(el => {
    const matchF = currentFilter==='todos' || el.dataset.e===currentFilter;
    const matchS = !q || el.dataset.num.includes(q) || (el.dataset.rb||'').toLowerCase().includes(q) || (el.dataset.n||'').toLowerCase().includes(q);
    if (matchF && matchS) {
      el.classList.remove('dimmed');
      if (q) el.classList.add('highlighted'); else el.classList.remove('highlighted');
    } else {
      el.classList.add('dimmed'); el.classList.remove('highlighted');
    }
  });
}

function openModal(id) {
  currentStandId = id;
  const data  = (FULL_DATA.pbData||{})[id] || (FULL_DATA.paData||{})[id] || {};
  const extra = (FULL_DATA.extraData||{})[id] || {};
  const estado = data.e || 'Disponible';
  const icons  = { Pagado:'✅', Señado:'⭐', Disponible:'🔓', Excedido:'⚠️' };

  const badge = document.getElementById('modalBadge');
  badge.setAttribute('data-e', estado);
  badge.textContent = `${icons[estado]||''} ${estado}`;

  document.getElementById('modalNum').textContent    = `Stand ${id}`;
  document.getElementById('modalNombre').textContent = extra.n || '';
  document.getElementById('modalRubro').textContent  = data.rb || '(sin rubro)';
  document.getElementById('modalZona').textContent   = '';

  // Teléfono / WhatsApp
  const telEl = document.getElementById('modalTel');
  const tel   = extra.tel || '';
  if (tel) {
    const telLimpio = tel.replace(/[\s\-\(\)\.]/g, '');
    const telWA = telLimpio.startsWith('0')
      ? '54' + telLimpio.slice(1)
      : telLimpio.startsWith('+') ? telLimpio.slice(1) : '54' + telLimpio;
    telEl.href = `https://wa.me/${telWA}`;
    document.getElementById('modalTelText').textContent = tel;
    telEl.style.display = 'inline-flex';
  } else {
    telEl.style.display = 'none';
  }

  // Dinero
  const moneyEl = document.getElementById('modalMoney');
  if (extra.p !== undefined || extra.d !== undefined) {
    moneyEl.style.display = 'flex';
    document.getElementById('modalTotal').textContent = `$${(extra.p||0).toLocaleString('es-AR')}`;
    const debe = extra.d || 0;
    const debeBox = document.getElementById('modalDebeBox');
    document.getElementById('modalDebe').textContent = `$${debe.toLocaleString('es-AR')}`;
    debeBox.className = 'money-box ' + (debe>0 ? 'debe-mal' : 'debe-ok');
  } else {
    moneyEl.style.display = 'none';
  }

  document.getElementById('modalOverlay').classList.add('open');

  // Sección asignar feriante: solo para Disponibles
  const assignSection = document.getElementById('assignSection');
  if (estado === 'Disponible') {
    assignSection.style.display = 'block';
    resetAssignUI();
  } else {
    assignSection.style.display = 'none';
  }

  // Sección pagos: solo para Señados
  const pagosSection = document.getElementById('pagosSection');
  if (estado === 'Señado') {
    pagosSection.style.display = 'block';
    renderPagos(extra);
  } else {
    pagosSection.style.display = 'none';
  }
}

// ── ASIGNAR FERIANTE – lógica de búsqueda ──────────────────────────────────
let selectedFeriante = null;

function resetAssignUI() {
  selectedFeriante = null;
  document.getElementById('assignSearch').value = '';
  document.getElementById('assignSearchClear').style.display = 'none';
  document.getElementById('assignDropdown').classList.remove('open');
  document.getElementById('assignPill').classList.remove('visible');
  document.getElementById('assignPillName').textContent = '';
  document.getElementById('assignMsg').textContent = '';
  document.getElementById('assignMsg').className = 'assign-msg';
  document.getElementById('assignBtn').disabled = true;
  document.getElementById('assignSearchWrap').style.display = 'block';
}

function filterFeriantes() {
  const q   = document.getElementById('assignSearch').value.trim().toLowerCase();
  const dd  = document.getElementById('assignDropdown');
  const clr = document.getElementById('assignSearchClear');

  clr.style.display = q ? 'block' : 'none';

  const matches = q
    ? FERIANTES_LIST.filter(f => f.toLowerCase().includes(q))
    : FERIANTES_LIST.slice(0, 40);  // sin texto muestra los primeros 40

  if (!matches.length) {
    dd.innerHTML = `<div class="assign-dropdown-empty">Sin resultados para "${q}"</div>`;
  } else {
    dd.innerHTML = matches.map(f => {
      const label = q
        ? f.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),
            '<mark>$1</mark>')
        : f;
      return `<div class="assign-dropdown-item" ontouchstart="" onclick="selectFeriante('${f.replace(/'/g,"\\'")}')">
        ${label}
      </div>`;
    }).join('');
  }
  dd.classList.add('open');
}

function selectFeriante(nombre) {
  selectedFeriante = nombre;
  document.getElementById('assignPillName').textContent = nombre;
  document.getElementById('assignPill').classList.add('visible');
  document.getElementById('assignSearchWrap').style.display = 'none';
  document.getElementById('assignDropdown').classList.remove('open');
  document.getElementById('assignBtn').disabled = false;
  document.getElementById('assignMsg').textContent = '';
  document.getElementById('assignMsg').className = 'assign-msg';
}

function clearAssignSelection() {
  selectedFeriante = null;
  document.getElementById('assignPill').classList.remove('visible');
  document.getElementById('assignSearchWrap').style.display = 'block';
  document.getElementById('assignSearch').value = '';
  document.getElementById('assignSearchClear').style.display = 'none';
  document.getElementById('assignBtn').disabled = true;
  document.getElementById('assignSearch').focus();
}

function clearAssignSearch() {
  document.getElementById('assignSearch').value = '';
  document.getElementById('assignSearchClear').style.display = 'none';
  document.getElementById('assignDropdown').classList.remove('open');
  document.getElementById('assignSearch').focus();
}

// Cerrar dropdown al tocar fuera
document.addEventListener('click', e => {
  const wrap = document.getElementById('assignSearchWrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('assignDropdown').classList.remove('open');
  }
});

async function asignarFeriante() {
  const feriante = selectedFeriante;
  const msgEl    = document.getElementById('assignMsg');
  const btn      = document.getElementById('assignBtn');

  msgEl.textContent = '';
  msgEl.className = 'assign-msg';

  if (!feriante) {
    msgEl.textContent = 'Seleccioná un feriante primero.';
    msgEl.className = 'assign-msg err';
    return;
  }
  if (!currentStandId) return;

  btn.disabled = true;
  btn.textContent = 'Guardando...';

  try {
    const url = `${API_URL}?tipo=asignar&stand=${encodeURIComponent(currentStandId)}&feriante=${encodeURIComponent(feriante)}&user=${encodeURIComponent(CURRENT_USER)}`;
    const res  = await fetch(url);
    const data = await res.json();
    if (data.ok) {
      msgEl.textContent = `✅ ${feriante} asignado correctamente.`;
      msgEl.className = 'assign-msg ok';
      if (!FULL_DATA.extraData) FULL_DATA.extraData = {};
      if (!FULL_DATA.extraData[currentStandId]) FULL_DATA.extraData[currentStandId] = {};
      FULL_DATA.extraData[currentStandId].n = feriante;
      setTimeout(() => {
        document.getElementById('assignSection').style.display = 'none';
      }, 1800);
    } else {
      msgEl.textContent = data.error || 'Error al guardar.';
      msgEl.className = 'assign-msg err';
    }
  } catch(err) {
    msgEl.textContent = 'Error de conexión.';
    msgEl.className = 'assign-msg err';
  }

  btn.disabled = false;
  btn.textContent = 'Asignar';
}

function closeModal(e) {
  if (!e || e.target===document.getElementById('modalOverlay') || e.currentTarget.tagName==='BUTTON') {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

const ZOOM_STEPS = [0.4, 0.5, 0.6, 0.75, 0.9, 1.1, 1.3];
let zoomIdx = 2;
function aplicarZoom() {
  const scale = ZOOM_STEPS[zoomIdx];
  document.querySelectorAll('.map-inner').forEach(inner => { inner.style.transform=`scale(${scale})`; });
  document.getElementById('zoomLabel').textContent = Math.round(scale*100)+'%';
  fixMapSize(); centerMap();
}
function cambiarZoom(dir) { zoomIdx=Math.max(0,Math.min(ZOOM_STEPS.length-1,zoomIdx+dir)); aplicarZoom(); }
function fixMapSize() {
  const scale = ZOOM_STEPS[zoomIdx];
  document.querySelectorAll('.map-inner').forEach(inner => {
    const bg=inner.querySelector('.map-bg');
    const w=Math.max(inner.scrollWidth, bg?parseInt(bg.getAttribute('width')):0);
    const h=Math.max(inner.scrollHeight,bg?parseInt(bg.getAttribute('height')):0);
    inner.style.width=(w*scale)+'px'; inner.style.height=(h*scale)+'px';
  });
}
function centerMap() {
  const scale = ZOOM_STEPS[zoomIdx];
  document.querySelectorAll('.map-scroll').forEach(container => {
    const inner=container.querySelector('.map-inner'); if(!inner) return;
    const cw=inner.scrollWidth*scale;
    inner.style.marginLeft=cw<container.clientWidth?(container.clientWidth-cw)/2+'px':'0px';
  });
}
// ── LOGIN ────────────────────────────────────────────────────────────────────
let CURRENT_USER = null;

async function initLogin() {
  // ¿Ya hay sesión activa?
  const saved = sessionStorage.getItem('feriaUser');
  if (saved) {
    activarSesion(saved);
    return;
  }
  // Cargar lista de usuarios para el combo
  try {
    const res  = await fetch(API_URL + '?tipo=usuarios');
    const data = await res.json();
    const sel  = document.getElementById('loginUser');
    if (data.ok && data.usuarios.length) {
      sel.innerHTML = '<option value="">— Elegí tu usuario —</option>' +
        data.usuarios.map(u => `<option value="${u}">${u}</option>`).join('');
    } else {
      sel.innerHTML = '<option value="">Error al cargar usuarios</option>';
    }
  } catch(err) {
    document.getElementById('loginUser').innerHTML = '<option value="">Error de conexión</option>';
  }
}

async function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  const errEl = document.getElementById('loginError');
  const btn   = document.getElementById('loginBtn');

  errEl.textContent = '';
  if (!user) { errEl.textContent = 'Seleccioná un usuario'; return; }
  if (!pass) { errEl.textContent = 'Ingresá tu contraseña'; return; }

  btn.disabled = true;
  btn.textContent = 'Verificando...';
  try {
    const res  = await fetch(`${API_URL}?tipo=login&user=${encodeURIComponent(CURRENT_USER)}&pass=${encodeURIComponent(pass)}`);
    const data = await res.json();
    if (data.ok) {
      sessionStorage.setItem('feriaUser', data.user);
      activarSesion(data.user);
    } else {
      errEl.textContent = data.error || 'Usuario o contraseña incorrectos';
    }
  } catch(err) {
    errEl.textContent = 'Error de conexión. Intentá de nuevo.';
  }
  btn.disabled = false;
  btn.textContent = 'Ingresar';
}

function activarSesion(user) {
  CURRENT_USER = user;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('userPillName').textContent = user;
  document.getElementById('userPill').style.display = 'inline-flex';
  load(); // carga el mapa recién después del login
}

function cerrarSesion() {
  if (!confirm('¿Cerrar sesión?')) return;
  sessionStorage.removeItem('feriaUser');
  location.reload();
}

// ── PAGOS ────────────────────────────────────────────────────────────────────
let MEDIOS_PAGO = [];
let pagoNumActual = 0; // 1, 2 o 3 según cuál cargar

async function cargarMediosPago() {
  if (MEDIOS_PAGO.length) return; // ya cargados
  try {
    const res  = await fetch(`${API_URL}?tipo=medios`);
    const data = await res.json();
    if (data.ok && data.medios) {
      MEDIOS_PAGO = data.medios;
    }
  } catch(e) {
    MEDIOS_PAGO = [];
  }
}

function renderPagos(extra) {
  // extra puede tener: p1m (monto p1), p1f, p1r, p1med, p2m, ..., p3m, ...
  const pagos = [
    { num:1, monto: extra.p1m, fecha: extra.p1f, resp: extra.p1r, medio: extra.p1med },
    { num:2, monto: extra.p2m, fecha: extra.p2f, resp: extra.p2r, medio: extra.p2med },
    { num:3, monto: extra.p3m, fecha: extra.p3f, resp: extra.p3r, medio: extra.p3med },
  ];

  const listEl = document.getElementById('pagosList');
  listEl.innerHTML = pagos.map(p => {
    const cargado = p.monto !== undefined && p.monto !== null && p.monto !== '' && Number(p.monto) > 0;
    const fecha = p.fecha ? new Date(p.fecha).toLocaleString('es-AR', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' }) : '';
    return `<div class="pago-item ${cargado ? 'cargado' : ''}">
      <div class="pago-num">${p.num}</div>
      <div class="pago-info">
        <div class="pago-estado">${cargado ? 'Pagado' : 'Pendiente'}</div>
        ${cargado ? `<div class="pago-detalle">${fecha} · ${p.resp||''} · ${p.medio||''}</div>` : ''}
      </div>
      ${cargado ? `<div class="pago-monto">$${Number(p.monto).toLocaleString('es-AR')}</div>` : ''}
    </div>`;
  }).join('');

  // Determinar qué pago cargar: el primero sin monto
  const siguiente = pagos.find(p => !(p.monto !== undefined && p.monto !== null && p.monto !== '' && Number(p.monto) > 0));
  const pagoForm  = document.getElementById('pagoForm');
  const pagoMsg   = document.getElementById('pagoMsg');
  pagoMsg.textContent = '';
  pagoMsg.className   = 'pago-msg';

  if (!siguiente) {
    // Los 3 pagos ya están cargados
    pagoForm.style.display = 'none';
    return;
  }

  pagoNumActual = siguiente.num;
  document.getElementById('pagoFormTitle').textContent = `Cargar Pago ${siguiente.num}`;
  document.getElementById('pagoMonto').value  = '';
  pagoForm.style.display = 'flex';

  // Cargar medios de pago en el select
  cargarMediosPago().then(() => {
    const sel = document.getElementById('pagoMedio');
    if (MEDIOS_PAGO.length) {
      sel.innerHTML = '<option value="">— Elegí medio —</option>' +
        MEDIOS_PAGO.map(m => `<option value="${m}">${m}</option>`).join('');
    } else {
      sel.innerHTML = '<option value="">Sin medios cargados</option>';
    }
  });
}

async function cargarPago() {
  const btn    = document.getElementById('pagoBtn');
  const msgEl  = document.getElementById('pagoMsg');
  const monto  = Number(document.getElementById('pagoMonto').value);
  const medio  = document.getElementById('pagoMedio').value.trim();
  const extra  = (FULL_DATA.extraData||{})[currentStandId] || {};
  const debe   = Number(extra.d || 0);

  msgEl.textContent = '';
  msgEl.className   = 'pago-msg';

  if (!monto || monto <= 0)       { msgEl.textContent = 'Ingresá un monto válido.';              msgEl.className='pago-msg err'; return; }
  if (monto > debe)               { msgEl.textContent = `El monto no puede superar el Debe ($${debe.toLocaleString('es-AR')}).`; msgEl.className='pago-msg err'; return; }
  if (!medio)                     { msgEl.textContent = 'Seleccioná un medio de pago.';           msgEl.className='pago-msg err'; return; }
  if (!currentStandId)            return;

  btn.disabled    = true;
  btn.textContent = 'Guardando...';

  try {
    const url = `${API_URL}?tipo=pago&stand=${encodeURIComponent(currentStandId)}&num=${pagoNumActual}&monto=${monto}&medio=${encodeURIComponent(medio)}&user=${encodeURIComponent(CURRENT_USER)}`;
    const res  = await fetch(url);
    const data = await res.json();

    if (data.ok) {
      msgEl.textContent = `✅ Pago ${pagoNumActual} registrado correctamente.`;
      msgEl.className   = 'pago-msg ok';

      // Actualizar extraData local para reflejar el pago sin recargar
      if (!FULL_DATA.extraData[currentStandId]) FULL_DATA.extraData[currentStandId] = {};
      const ex = FULL_DATA.extraData[currentStandId];
      const k  = `p${pagoNumActual}`;
      ex[`${k}m`]   = monto;
      ex[`${k}f`]   = new Date().toISOString();
      ex[`${k}r`]   = CURRENT_USER;
      ex[`${k}med`] = medio;
      ex.d          = Math.max(0, (Number(ex.d)||0) - monto);

      // Actualizar el box "Debe" en el modal
      const debeBox = document.getElementById('modalDebeBox');
      document.getElementById('modalDebe').textContent = `$${ex.d.toLocaleString('es-AR')}`;
      debeBox.className = 'money-box ' + (ex.d > 0 ? 'debe-mal' : 'debe-ok');

      setTimeout(() => { renderPagos(ex); }, 1200);
    } else {
      msgEl.textContent = data.error || 'Error al guardar el pago.';
      msgEl.className   = 'pago-msg err';
    }
  } catch(err) {
    msgEl.textContent = 'Error de conexión.';
    msgEl.className   = 'pago-msg err';
  }

  btn.disabled    = false;
  btn.textContent = 'Registrar pago';
}

initLogin();

</script>
